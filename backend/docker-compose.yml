version: '3.8'

services:
  mongodb:
    image: mongo:latest
    container_name: blockrent-mongodb
    ports:
      - "27017:27017"
    volumes:
      - mongo-data:/data/db

  backend:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: blockrent-backend
    ports:
      - "3000:3000"
    env_file:
      - .env
    environment:
      - MONGO_URI=mongodb://mongodb:27017/blockrent
      - PORT=3000
    depends_on:
      - mongodb

volumes:
  mongo-data:
