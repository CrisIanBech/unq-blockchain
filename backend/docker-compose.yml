version: '3.8'

services:
  mongodb:
    image: mongo:latest
    container_name: blockrent-mongodb
    network_mode: "host"
    volumes:
      - mongo-data:/data/db

  backend:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: blockrent-backend
    network_mode: "host"
    env_file:
      - .env
    environment:
      - MONGO_URI=mongodb://localhost:27017/blockrent
      - PORT=3000
      - RPC_URL=http://localhost:8545
    depends_on:
      - mongodb

volumes:
  mongo-data:
